title: KAI — Kernel AI Assistant
description: Kernel-aware infrastructure diagnostics with skill-driven AI workflows.
theme: jekyll-theme-minimal
baseurl: /kai
url: https://sameehj.github.io
show_downloads: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "KAI Team"
